  <section class="contact-page">
    <div class="contact-figure">
      <svg viewBox="-40 -170 240 200" fill="none">
        <!-- stick figure waving -->
        <path class="draw" id="c-body" d="M 0 0 L 0 -60 L 0 -120" />
        <path class="draw" id="c-leg-l" d="M 0 -60 L -20 0" />
        <path class="draw" id="c-leg-r" d="M 0 -60 L 20 0" />
        <path class="draw" id="c-arm-l" d="M 0 -110 C -15 -95, -25 -85, -35 -80" />
        <path class="draw" id="c-arm-r" d="M 0 -110 C 20 -120, 40 -140, 55 -155" />
        <path class="draw" id="c-hand" d="
          M 55 -155 L 50 -170
          M 55 -155 L 58 -172
          M 55 -155 L 65 -168
          M 55 -155 L 70 -162
          M 55 -155 L 72 -153
        " />
        <circle class="draw" id="c-head" cx="0" cy="-140" r="20" />
        <circle class="draw" id="c-eye-l" cx="-7" cy="-143" r="3" />
        <circle class="draw" id="c-eye-r" cx="7" cy="-143" r="3" />
        <path class="draw" id="c-smile" d="M -8 -133 C -4 -127, 4 -127, 8 -133" />
      </svg>
    </div>

    <h1>Say Hello</h1>
    <p>Got a project in mind, or just want to chat about design & code? Reach out.</p>

    <div class="contact-links">
      <a href="mailto:msuhan05@gmail.com" class="contact-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7 L12 13 L2 7"/>
        </svg>
        Email
      </a>
      <a href="#" class="contact-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
        </svg>
        LinkedIn
      </a>
      <a href="#" class="contact-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        GitHub
      </a>
    </div>
  </section>

  <script>
    // draw the contact figure on load
    const ids = ['c-body','c-leg-l','c-leg-r','c-arm-l','c-arm-r','c-hand','c-head','c-eye-l','c-eye-r','c-smile'];
    const delays = [200, 500, 650, 800, 950, 1400, 1100, 1700, 1850, 2000];
    const durs   = [1000, 500, 500, 500, 600, 400, 700, 250, 250, 350];

    ids.forEach((id, i) => {
      const el = document.getElementById(id);
      const len = el.getTotalLength();
      el.style.strokeDasharray = len;
      el.style.strokeDashoffset = len;
    });

    requestAnimationFrame(() => {
      ids.forEach((id, i) => {
        const el = document.getElementById(id);
        setTimeout(() => {
          el.style.transition = `stroke-dashoffset ${durs[i]}ms cubic-bezier(0.16, 1, 0.3, 1)`;
          el.style.strokeDashoffset = 0;
        }, delays[i]);
      });

      // wave
      setTimeout(() => {
        const hand = document.getElementById('c-hand');
        hand.style.transformOrigin = '55px -155px';
        hand.style.animation = 'wave 0.5s ease-in-out 3';
      }, 2500);
    });
  </script>
</body>
